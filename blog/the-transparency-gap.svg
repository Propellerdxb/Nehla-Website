<text font-family="Inter,sans-serif" fill="#121C2D"><tspan x="72" y="148" font-size="56" font-weight="300" letter-spacing="-1">The</tspan><tspan x="72" dy="66" font-size="56" font-weight="300" letter-spacing="-1">Transparency</tspan><tspan x="72" dy="66" font-size="56" font-weight="700" letter-spacing="-1" fill="#2E5BFF">Gap.</tspan></text>
<circle cx="226" cy="278" r="7" fill="#00FFC2"/>
<rect x="72" y="300" width="300" height="1.5" fill="url(#accentH)" opacity="0.6"/>
<text x="72" y="328" font-family="Inter,sans-serif" font-size="16" font-weight="300" fill="#334155">What owners actually want from</text>
<text x="72" y="347" font-family="Inter,sans-serif" font-size="16" font-weight="300" fill="#334155">their strata manager.</text>
