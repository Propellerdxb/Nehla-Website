<rect x="840" y="420" width="3" height="62" fill="#2E5BFF"/>
<text x="858" y="445" font-family="Inter,sans-serif" font-size="20" font-weight="600" fill="#121C2D">15–20</text>
<text x="858" y="461" font-family="Inter,sans-serif" font-size="10" font-weight="300" fill="#64748B">owner touchpoints/yr</text>
<text x="858" y="474" font-family="Inter,sans-serif" font-size="10" font-weight="300" fill="#64748B">vs what owners expect</text>

<rect x="1007" y="420" width="157" height="62" rx="5" fill="white" fill-opacity="0.85" stroke="#00FFC2" stroke-width="0.8" stroke-opacity="0.5"/>
<rect x="1007" y="420" width="3" height="62" fill="#00FFC2"/>
<text x="1025" y="445" font-family="Inter,sans-serif" font-size="20" font-weight="600" fill="#121C2D">#1 reason</text>
<text x="1025" y="461" font-family="Inter,sans-serif" font-size="10" font-weight="300" fill="#64748B">owners leave isn&#x2019;t price</text>
<text x="1025" y="474" font-family="Inter,sans-serif" font-size="10" font-weight="300" fill="#64748B">it&#x2019;s feeling uninformed</text>

