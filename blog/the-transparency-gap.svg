<text x="747" y="114" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="600" fill="#85B7EB" letter-spacing="1.5">THE TRANSPARENCY GAP</text>

<!-- Manager column header -->
<text x="704" y="148" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="600" fill="#64748B" letter-spacing="0.5">MANAGER THINKS</text>
<line x1="664" y1="153" x2="744" y2="153" stroke="#B5D4F4" stroke-width="0.8"/>

<!-- Owner column header -->
<text x="794" y="148" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="600" fill="#2E5BFF" letter-spacing="0.5">OWNER FEELS</text>
<line x1="754" y1="153" x2="834" y2="153" stroke="#2E5BFF" stroke-width="0.8" opacity="0.4"/>

<!-- Central divider -->
<line x1="747" y1="138" x2="747" y2="400" stroke="#E2E8F0" stroke-width="1"/>

<!-- Row 1 -->
<text x="704" y="172" text-anchor="middle" font-family="Inter,sans-serif" font-size="7.5" font-weight="300" fill="#64748B">I send quarterly reports</text>
<text x="794" y="172" text-anchor="middle" font-family="Inter,sans-serif" font-size="7.5" font-weight="600" fill="#2E5BFF">I hear nothing</text>
<!-- Arrow showing gap -->
<line x1="738" y1="169" x2="756" y2="169" stroke="#FF9500" stroke-width="1" stroke-dasharray="2 2" opacity="0.7"/>

<!-- Row 2 -->
<text x="704" y="198" text-anchor="middle" font-family="Inter,sans-serif" font-size="7.5" font-weight="300" fill="#64748B">I communicate enough</text>
<text x="794" y="198" text-anchor="middle" font-family="Inter,sans-serif" font-size="7.5" font-weight="600" fill="#2E5BFF">I check, find nothing new</text>
<line x1="738" y1="195" x2="756" y2="195" stroke="#FF9500" stroke-width="1" stroke-dasharray="2 2" opacity="0.7"/>

<!-- Row 3 -->
<text x="704" y="224" text-anchor="middle" font-family="Inter,sans-serif" font-size="7.5" font-weight="300" fill="#64748B">Annual report is detailed</text>
<text x="794" y="224" text-anchor="middle" font-family="Inter,sans-serif" font-size="7.5" font-weight="600" fill="#2E5BFF">I can't understand it</text>
<line x1="738" y1="221" x2="756" y2="221" stroke="#FF9500" stroke-width="1" stroke-dasharray="2 2" opacity="0.7"/>

<!-- Row 4 -->
<text x="704" y="250" text-anchor="middle" font-family="Inter,sans-serif" font-size="7.5" font-weight="300" fill="#64748B">Fees are in the contract</text>
<text x="794" y="250" text-anchor="middle" font-family="Inter,sans-serif" font-size="7.5" font-weight="600" fill="#2E5BFF">What am I paying for?</text>
<line x1="738" y1="247" x2="756" y2="247" stroke="#FF9500" stroke-width="1" stroke-dasharray="2 2" opacity="0.7"/>

<!-- Row 5 -->
<text x="704" y="276" text-anchor="middle" font-family="Inter,sans-serif" font-size="7.5" font-weight="300" fill="#64748B">I'm managing it well</text>
<text x="794" y="276" text-anchor="middle" font-family="Inter,sans-serif" font-size="7.5" font-weight="600" fill="#2E5BFF">What's going on?</text>
<line x1="738" y1="273" x2="756" y2="273" stroke="#FF9500" stroke-width="1" stroke-dasharray="2 2" opacity="0.7"/>

<!-- Gap label -->
