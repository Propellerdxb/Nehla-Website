<text x="172" y="390" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#2E5BFF">Informed &gt; cheapest</text>
<rect x="282" y="370" width="175" height="30" rx="15" fill="rgba(0,255,194,0.07)" stroke="rgba(15,110,86,0.35)" stroke-width="1"/>
<text x="369" y="390" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#0F6E56">Weekly &gt; quarterly</text>
<rect x="72" y="412" width="200" height="30" rx="15" fill="rgba(46,91,255,0.06)" stroke="rgba(46,91,255,0.28)" stroke-width="1"/>
<text x="172" y="432" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#185FA5">Trust = retention</text>
