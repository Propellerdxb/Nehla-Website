<text x="84" y="527" font-family="Inter,sans-serif" font-size="9" font-weight="600" fill="#B5D4F4">Conflict emerges</text>
<text x="84" y="542" font-family="Inter,sans-serif" font-size="9" font-weight="300" fill="#64748B">By-law breach or neighbor dispute</text>
<circle cx="340" cy="531" r="6" fill="#00FFC2"/>
<text x="352" y="527" font-family="Inter,sans-serif" font-size="9" font-weight="600" fill="#B5D4F4">Early intervention</text>
<text x="352" y="542" font-family="Inter,sans-serif" font-size="9" font-weight="300" fill="#64748B">Manager steps in · most resolved here</text>
<circle cx="680" cy="531" r="8" fill="url(#accentV)"/>
<text x="694" y="527" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#2E5BFF">Escalation if needed &#x2014; with documentation</text>
<text x="694" y="542" font-family="Inter,sans-serif" font-size="9" font-weight="300" fill="#64748B">Warning letter · mediation · paper trail intact</text>
<circle cx="1010" cy="531" r="6" fill="#FF4D4D" opacity="0.8"/>
<text x="1000" y="527" text-anchor="end" font-family="Inter,sans-serif" font-size="9" font-weight="600" fill="#FF7A7A">Tribunal (last resort)</text>
<text x="1000" y="542" text-anchor="end" font-family="Inter,sans-serif" font-size="9" font-weight="300" fill="#64748B">NCAT · VCAT · BCCM</text>
