<!-- ILLUSTRATION: ESCALATION FUNNEL
     Wide at top (many conflicts), narrowing to tribunal (few reach there)
     5 stages shown as horizontal bands of decreasing width -->

<!-- Stage labels on left side -->
<text x="660" y="112" font-family="Inter,sans-serif" font-size="8" font-weight="600" fill="#85B7EB">1. CONFLICT EMERGES</text>
<text x="660" y="178" font-family="Inter,sans-serif" font-size="8" font-weight="600" fill="#00FFC2">2. EARLY INTERVENTION</text>
<text x="660" y="244" font-family="Inter,sans-serif" font-size="8" font-weight="600" fill="#2E5BFF">3. FORMAL ESCALATION</text>
<text x="660" y="310" font-family="Inter,sans-serif" font-size="8" font-weight="600" fill="#FF9500">4. MEDIATION</text>
<text x="660" y="376" font-family="Inter,sans-serif" font-size="8" font-weight="600" fill="#FF4D4D">5. TRIBUNAL</text>

<!-- Funnel bands — centred around x=800, narrowing downward -->
<!-- Stage 1: full width, muted -->
<rect x="720" y="96" width="180" height="46" rx="4" fill="#064280" fill-opacity="0.4" stroke="#378ADD" stroke-width="0.8" stroke-opacity="0.5"/>
<text x="810" y="124" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="300" fill="#64748B">Noise · parking · pets · alterations · by-law breach</text>

<!-- Intercept arrow — all disputes, most stopped here -->
<text x="810" y="150" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="#00FFC2">&#x2193; 80% resolved here</text>

<!-- Stage 2: slightly narrower, mint — this is the key intervention point -->
<rect x="736" y="158" width="148" height="46" rx="4" fill="#00FFC2" fill-opacity="0.1" stroke="#00FFC2" stroke-width="1.2"/>
<text x="810" y="180" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="300" fill="#85B7EB">Manager conversation · quiet reminder · clarify rule</text>
<text x="810" y="194" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" font-weight="300" fill="#00FFC2">&#x2190; Stop it here</text>

<!-- Stage 3: narrower, cobalt -->
<rect x="752" y="224" width="116" height="46" rx="4" fill="#2E5BFF" fill-opacity="0.12" stroke="#2E5BFF" stroke-width="1"/>
<text x="810" y="244" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="300" fill="#85B7EB">Formal warning letter · committee involvement</text>
<text x="810" y="256" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" font-weight="300" fill="#2E5BFF">Document everything</text>

<!-- Stage 4: narrower, orange -->
<rect x="768" y="290" width="84" height="46" rx="4" fill="#FF9500" fill-opacity="0.1" stroke="#FF9500" stroke-width="1"/>
<text x="810" y="310" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="300" fill="#85B7EB">Internal or formal mediation</text>
<text x="810" y="322" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" font-weight="300" fill="#FFB340">Paper trail critical</text>

<!-- Stage 5: narrowest, red — tribunal -->
<rect x="780" y="356" width="60" height="46" rx="4" fill="#FF4D4D" fill-opacity="0.15" stroke="#FF4D4D" stroke-width="1.2"/>
<text x="810" y="374" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="300" fill="#FF7A7A">NCAT · VCAT · BCCM</text>
<text x="810" y="386" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" font-weight="300" fill="#64748B">Last resort</text>

<!-- State labels right side -->
<text x="845" y="120" font-family="Inter,sans-serif" font-size="7" font-weight="300" fill="#64748B">NSW · VIC · QLD</text>
<text x="845" y="196" font-family="Inter,sans-serif" font-size="7" font-weight="600" fill="#00FFC2">&#x2190; Best outcome</text>
<text x="845" y="262" font-family="Inter,sans-serif" font-size="7" font-weight="300" fill="#64748B">Record all attempts</text>
<text x="845" y="316" font-family="Inter,sans-serif" font-size="7" font-weight="300" fill="#64748B">Structured process</text>
<text x="845" y="380" font-family="Inter,sans-serif" font-size="7" font-weight="600" fill="#FF7A7A">Expensive · slow</text>

<!-- Badge: 80% resolved without tribunal -->
<circle cx="808" cy="460" r="40" fill="#042C53" opacity="0.9"/>
<circle cx="808" cy="460" r="40" fill="none" stroke="url(#accentV)" stroke-width="2.5"/>
<circle cx="808" cy="460" r="32" fill="none" stroke="rgba(46,91,255,0.18)" stroke-width="1"/>
<text x="808" y="449" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" font-weight="400" fill="#85B7EB" letter-spacing="1">PREVENTED BY</text>
<text x="808" y="465" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" font-weight="700" fill="white">80%</text>
<text x="808" y="479" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" font-weight="300" fill="#00FFC2" letter-spacing="1">EARLY STEP-IN</text>

<!-- Stat cards -->
<rect x="656" y="430" width="136" height="56" rx="5" fill="#0C447C" fill-opacity="0.4" stroke="#2E5BFF" stroke-width="0.8" stroke-opacity="0.35"/>
<rect x="656" y="430" width="3" height="56" fill="#2E5BFF"/>
<text x="674" y="452" font-family="Inter,sans-serif" font-size="18" font-weight="600" fill="#E6F1FB">5 stages</text>
<text x="674" y="467" font-family="Inter,sans-serif" font-size="9" font-weight="300" fill="#85B7EB">most resolved at stage 2</text>
<text x="674" y="479" font-family="Inter,sans-serif" font-size="9" font-weight="300" fill="#64748B">if manager intervenes early</text>

<!-- Left accent bar -->
<rect x="0" y="0" width="6" height="630" fill="url(#accentV)"/>
<text x="72" y="58" font-family="Inter,sans-serif" font-size="13" font-weight="400" fill="rgba(133,183,235,0.75)" letter-spacing="2.5">THE STRATA EDIT  ·  THE HUMAN SIDE</text>
<rect x="72" y="70" width="280" height="1" fill="url(#accentH)" opacity="0.5"/>
<text font-family="Inter,sans-serif" fill="#E6F1FB">
  <tspan x="72" y="148" font-size="52" font-weight="300" letter-spacing="-1">Dispute</tspan>
  <tspan x="72" dy="62" font-size="52" font-weight="300" letter-spacing="-1">Resolution</tspan>
  <tspan x="72" dy="62" font-size="52" font-weight="300" letter-spacing="-1">in Strata.</tspan>
  <tspan x="72" dy="62" font-size="52" font-weight="700" letter-spacing="-1" fill="#00FFC2">Stop it early.</tspan>
</text>
<circle cx="282" cy="332" r="6" fill="#2E5BFF"/>
<rect x="72" y="352" width="300" height="1.5" fill="url(#accentH)" opacity="0.7"/>
<text x="72" y="380" font-family="Inter,sans-serif" font-size="15" font-weight="300" fill="rgba(181,212,244,0.85)">80% of disputes never need tribunal.</text>
<text x="72" y="399" font-family="Inter,sans-serif" font-size="15" font-weight="300" fill="rgba(181,212,244,0.85)">Early intervention is the skill.</text>
<rect x="72" y="422" width="175" height="28" rx="14" fill="rgba(46,91,255,0.18)" stroke="rgba(46,91,255,0.6)" stroke-width="1"/>
<text x="159" y="441" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#85B7EB">Intervene at stage 2</text>
<rect x="257" y="422" width="170" height="28" rx="14" fill="rgba(0,255,194,0.1)" stroke="rgba(0,255,194,0.5)" stroke-width="1"/>
<text x="342" y="441" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#00FFC2">NCAT · VCAT · BCCM</text>
<rect x="72" y="460" width="188" height="28" rx="14" fill="rgba(46,91,255,0.15)" stroke="rgba(46,91,255,0.5)" stroke-width="1"/>
<text x="166" y="479" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#85B7EB">Document everything always</text>
<!-- Slim timeline -->
<line x1="0" y1="516" x2="1200" y2="516" stroke="#0C447C" stroke-width="1" opacity="0.6"/>
<rect x="72" y="530" width="1076" height="3" rx="1.5" fill="#0C447C" opacity="0.8"/>
